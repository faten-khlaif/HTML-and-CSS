<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faten Khlaif - Student Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f0f4f8;
      color: #333;
    }
    nav {
      background-color: #2c3e50;
      padding: 10px;
      position: fixed;
      width: 100%;
      top: 0;
    }
    nav a {
      color: #ecf0f1;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    section {
      padding: 60px 20px;
      margin-top: 50px;
    }
    h1, h2 {
      color: #2c3e50;
    }
    img {
      max-width: 200px;
      margin: 10px;
      border-radius: 8px;
    }
    form {
      display: flex;
      flex-direction: column;
      max-width: 400px;
    }
    input, textarea {
      margin: 8px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #3498db;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    footer {
      background-color: #2c3e50;
      color: #ecf0f1;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="#home">Home</a>
    <a href="#pictures">Pictures</a>
    <a href="#video">Video</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- Home Section -->
  <section id="home">
    <h1>Welcome to Faten Khlaif’s Website</h1>
    <p>Hello! My name is Faten Khlaif. This is my personal student webpage showcasing my work, interests, and ways to connect with me.</p>
  </section>

  <!-- Pictures Section -->
  <section id="pictures">
    <h2>Gallery</h2>
    <img src="https://via.placeholder.com/200" alt="Sample Picture 1">
    <img src="https://via.placeholder.com/200" alt="Sample Picture 2">
    <img src="https://via.placeholder.com/200" alt="Sample Picture 3">
  </section>

  <!-- Video Section -->
  <section id="video">
    <h2>Featured Video</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
      title="YouTube video" frameborder="0" allowfullscreen></iframe>
  </section>

  <!-- Contact Section -->
  <section id="contact">
    <h2>Contact Me</h2>
    <form>
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" rows="5" placeholder="Your Message"></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Faten Khlaif. All rights reserved.</p>
  </footer>

</body>
</html>
